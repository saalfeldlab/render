# This workflow will build a Java project with Maven, and cache/restore any dependencies to improve the workflow execution time
# For more information see: https://help.github.com/actions/language-and-framework-guides/building-and-testing-java-with-maven

name: Maven build

on:
  push:
  pull_request:
  workflow_dispatch:

jobs:
  build:

    runs-on: ubuntu-22.04

    steps:
    - uses: actions/checkout@v4

    - name: Set up JDK 11
      uses: actions/setup-java@v5
      with:
        java-version: '11'
        distribution: 'zulu'
        cache: maven

    - name: Install Maven 3.9.11
      run: |
        curl -fsSL https://archive.apache.org/dist/maven/maven-3/3.9.11/binaries/apache-maven-3.9.11-bin.tar.gz -o maven.tar.gz
        tar -xzf maven.tar.gz
        echo "$PWD/apache-maven-3.9.11/bin" >> "$GITHUB_PATH"

    - name: Verify Maven version
      run: mvn -version

    - name: Build with Maven
      run: mvn --no-transfer-progress -Dproject.build.sourceEncoding=UTF-8 package --file pom.xml
